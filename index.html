<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #e8522a;
  --purple: #a44dff;
  --bg: #080a0f;
  --white: #ffffff;
  --gray-2: #999999;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  overflow: hidden;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--white);
}

#neb {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
}

.page {
  position: fixed;
  inset: 0;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top: 4vh;
}

/* NAME */
.name {
  font-size: clamp(36px, 11.5vw, 160px);
  font-weight: 800;
  letter-spacing: 0.04em;
  line-height: 1;
  text-transform: uppercase;
  white-space: nowrap;
  margin-bottom: 36px;
  opacity: 0;
  transform: translateY(20px);
  animation: nameIn 1s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
  width: 100vw;
  text-align: center;
}

@keyframes nameIn {
  to { opacity: 1; transform: translateY(0); }
}

.name-solid {
  color: var(--white);
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400;
  letter-spacing: 0.04em;
}

.name-ghost {
  color: transparent;
  -webkit-text-stroke: 2px rgba(255,255,255,0.92);
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400;
  letter-spacing: 0.04em;
}

/* TEXT NAV */
.text-nav {
  opacity: 0;
  margin-bottom: 28px;
  display: flex;
  gap: 56px;
  align-items: center;
  justify-content: center;
  animation: fadeUp 0.7s ease 1.1s forwards;
}

.nav-item {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--white);
  position: relative;
  padding-bottom: 5px;
}

.nav-item::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 1.5px;
  background: var(--coral);
  transition: width 0.3s ease;
}

.nav-item:hover::after { width: 100%; }
.nav-item:hover { color: var(--white); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* TAGLINE */
.tagline {
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 2px;
  color: var(--gray-2);
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  animation: fadeUp 0.6s ease 1.6s forwards;
}

@media (max-width: 768px) {
  .name { font-size: clamp(28px, 11vw, 80px); }
  .text-nav { gap: 28px; }
  .nav-item { font-size: 10px; }
}

@media (max-width: 480px) {
  .name { font-size: clamp(22px, 9vw, 50px); }
  .text-nav { gap: 16px; flex-wrap: wrap; }
  .nav-item { font-size: 9px; }
}

@media (prefers-reduced-motion: reduce) {
  .name, .text-nav, .tagline { animation: none; opacity: 1; transform: none; }
}

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* NEBULA */
(function () {
  const canvas = document.getElementById('neb');
  if (!canvas || !window.THREE) return;
  const THREE = window.THREE;
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
  camera.position.z = 4;
  const BX=2.7, BY=2.1, BZ=1.5;
  function cw(s){return((Math.random()+Math.random()+Math.random()+Math.random())/4*2-1)*s;}
  const starTex=(function(){
    const c=document.createElement('canvas'); c.width=c.height=64;
    const ctx=c.getContext('2d');
    const g=ctx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(0.25,'rgba(255,255,255,0.85)');
    g.addColorStop(0.5,'rgba(255,255,255,0.35)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,64,64);
    const tex=new THREE.CanvasTexture(c); tex.needsUpdate=true; return tex;
  })();
  function layer(count,color,size,opacity,blending){
    const pos=new Float32Array(count*3),spd=new Float32Array(count);
    for(let i=0;i<count;i++){pos[i*3]=cw(BX);pos[i*3+1]=cw(BY);pos[i*3+2]=cw(BZ);spd[i]=0.6+Math.random()*1.0;}
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(pos,3));
    const m=new THREE.PointsMaterial({color,size:size*1.7,sizeAttenuation:true,transparent:true,opacity,depthWrite:false,map:starTex,blending:blending||THREE.NormalBlending});
    const p=new THREE.Points(g,m); scene.add(p);
    return{pts:p,geo:g,mat:m,spd,count,baseOp:opacity,tw:Math.random()*6.28};
  }
  const layers=[
    layer(1800,0xeae8e3,0.015,0.9),
    layer(520,0x9a9a9a,0.021,0.6),
    layer(340,0xff5a3c,0.030,0.95,THREE.AdditiveBlending),
    layer(300,0xa44dff,0.028,0.9,THREE.AdditiveBlending),
    layer(40,0xff5a3c,0.085,0.9,THREE.AdditiveBlending),
    layer(20,0xb14cff,0.072,0.85,THREE.AdditiveBlending),
  ];
  function flow(x,y,z,t,o){const s=0.85;o[0]=Math.sin(y*s+t)+Math.cos(z*s*1.3-t*0.7);o[1]=Math.sin(z*s*1.1+t*0.8)+Math.cos(x*s*0.9+t);o[2]=(Math.sin(x*s*1.2-t)+Math.cos(y*s*1.05+t*0.6))*0.5;}
  function resize(){const w=window.innerWidth,h=window.innerHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
  resize(); window.addEventListener('resize',resize,{passive:true});
  let hasMouse=false,mwx=0,mwy=0;
  window.addEventListener('pointermove',e=>{hasMouse=true;mwx=((e.clientX/window.innerWidth)*2-1)*BX;mwy=-(((e.clientY/window.innerHeight)*2-1)*BY);},{passive:true});
  const grp=new THREE.Group(); layers.forEach(L=>grp.add(L.pts)); scene.add(grp);
  const v=[0,0,0]; let t=0;
  function loop(){
    t+=0.004; const speed=0.006;
    for(const L of layers){
      const a=L.geo.attributes.position.array;
      for(let i=0;i<L.count;i++){const ix=i*3;let x=a[ix],y=a[ix+1],z=a[ix+2];
        flow(x,y,z,t,v);const sp=speed*L.spd[i];x+=v[0]*sp;y+=v[1]*sp;z+=v[2]*sp;
        if(hasMouse){const dx=x-mwx,dy=y-mwy,d2=dx*dx+dy*dy;if(d2<0.8){const f=(0.8-d2)*0.06;x+=dx*f;y+=dy*f;}}
        if(x>BX)x-=BX*2;else if(x<-BX)x+=BX*2;
        if(y>BY)y-=BY*2;else if(y<-BY)y+=BY*2;
        if(z>BZ)z-=BZ*2;else if(z<-BZ)z+=BZ*2;
        a[ix]=x;a[ix+1]=y;a[ix+2]=z;}
      L.geo.attributes.position.needsUpdate=true;
      L.mat.opacity=L.baseOp*(0.78+0.22*Math.sin(t*1.6+L.tw));
    }
    grp.rotation.z=t*0.05; grp.rotation.x=Math.sin(t*0.3)*0.04; grp.position.y=Math.sin(t*0.4)*0.05;
    renderer.render(scene,camera); requestAnimationFrame(loop);
  }
  loop();
  setTimeout(()=>{
    canvas.style.transition='opacity 1.5s ease'; canvas.style.opacity='0.95';
    layers.forEach((L,i)=>{L.pts.scale.set(0.35,0.35,0.35);const start=performance.now(),dur=2000+i*150;
      function sc(){const p=Math.min(1,(performance.now()-start)/dur),val=0.35+0.65*p;L.pts.scale.set(val,val,val);if(p<1)requestAnimationFrame(sc);}
      requestAnimationFrame(sc);});
  },300);
})();
</script>
